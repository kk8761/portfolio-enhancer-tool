<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Project Portfolio Enhancer</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --accent-color: #58a6ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: white;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header, footer {
            background-color: var(--bg-secondary);
            text-align: center;
            padding: 1rem;
        }

        main {
            padding: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }

        .card:hover {
            transform: scale(1.02);
            transition: all 0.3s ease;
        }

        .loading, .empty-state {
            text-align: center;
            padding-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Project Portfolio Enhancer</h1>
    </header>
    <main>
        <section id="repos">
            <h2>Your Repositories</h2>
            <div class="loading">Loading...</div>
        </section>
        <section id="enhance-readme">
            <h2>Enhance README</h2>
            <input type="text" id="repo-name" placeholder="Enter repository name">
            <button id="enhance-btn">Enhance README</button>
            <div class="loading" id="enhance-loading">Loading...</div>
            <div id="enhanced-readme"></div>
        </section>
    </main>
    <footer>
        &copy; 2023 Project Portfolio Enhancer
    </footer>
    <script src="app.js"></script>
</body>
</html>
